# =============================================================================
# Nginx Reverse Proxy config cho GoClaw
# Domain: agenttwo.nguyentannga.name.vn
# =============================================================================
# Cài đặt:
#   cp nginx/goclaw.conf /etc/nginx/sites-available/goclaw
#   ln -s /etc/nginx/sites-available/goclaw /etc/nginx/sites-enabled/goclaw
#   nginx -t && systemctl reload nginx
# =============================================================================

# ── HTTP: redirect sang HTTPS + ACME challenge ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name agenttwo.nguyentannga.name.vn;

    # Let's Encrypt / Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    # Redirect tất cả HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Reverse proxy chính ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name agenttwo.nguyentannga.name.vn;

    # ── SSL Certificates (sẽ được Certbot điền vào tự động) ──
    # ssl_certificate     /etc/letsencrypt/live/agenttwo.nguyentannga.name.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agenttwo.nguyentannga.name.vn/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/goclaw_access.log;
    error_log  /var/log/nginx/goclaw_error.log warn;

    # ── Client body size (cho file upload) ───────────────────────────────────
    client_max_body_size 50M;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Main proxy: GoClaw ────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:18790;
        proxy_http_version 1.1;

        # WebSocket support — BẮT BUỘC vì GoClaw dùng WebSocket cho real-time
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   $server_port;

        # Timeout settings — tăng cao vì AI streaming responses có thể lâu
        proxy_read_timeout      300s;
        proxy_connect_timeout   75s;
        proxy_send_timeout      300s;

        # Tắt buffering để streaming SSE/WebSocket hoạt động đúng
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # Tắt cache cho API responses
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Static assets: cache lâu hơn ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:18790;
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets 7 ngày
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
