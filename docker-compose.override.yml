# docker-compose.override.yml
# Cấu hình PRODUCTION cho GoClaw trên VPS
# File này ghi đè docker-compose.yml gốc từ upstream goclaw repo
# KHÔNG commit file .env lên git!

services:
  goclaw:
    image: ghcr.io/nextlevelbuilder/goclaw:latest
    container_name: goclaw
    restart: unless-stopped
    ports:
      # Chỉ bind localhost — Nginx sẽ proxy vào đây
      # KHÔNG expose ra internet trực tiếp!
      - "127.0.0.1:18790:18790"
    env_file:
      - .env
    environment:
      - GOCLAW_HOST=0.0.0.0
      - GOCLAW_PORT=18790
    volumes:
      - goclaw_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18790/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg18
    container_name: goclaw_postgres
    restart: unless-stopped
    ports:
      # Chỉ bind localhost cho bảo mật
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-goclaw}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-goclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goclaw} -d ${POSTGRES_DB:-goclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  goclaw_data:
    driver: local
  postgres_data:
    driver: local
